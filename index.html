<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Blood Rush: Save The Heart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: #f8fafc; }
        .cyber-bg { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .health-bar { transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .cert-card { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body class="cyber-bg min-h-screen p-4 overflow-x-hidden">
    <div id="game-container" class="max-w-lg mx-auto mt-6">
        
        <!-- Login Screen -->
        <div id="screen-reg" class="space-y-6">
            <h1 class="text-5xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-cyan-400">MISSION</h1>
            <h2 class="text-4xl font-bold text-center text-white">BLOOD RUSH</h2>
            <div class="glass p-8 rounded-3xl space-y-4 shadow-[0_0_30px_rgba(6,182,212,0.2)]">
                <input id="stu-name" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700 focus:border-red-500 outline-none">
                <input id="stu-class" placeholder="ชั้น (เช่น ม.2/1)" class="w-full bg-slate-900/50 p-4 rounded-2xl border border-slate-700">
                <button onclick="startGame()" class="w-full bg-gradient-to-r from-red-600 to-red-500 py-4 rounded-2xl font-bold text-lg hover:shadow-[0_0_20px_rgba(220,38,38,0.5)] transition-all">เริ่มภารกิจ</button>
            </div>
        </div>

        <!-- Learning Screen -->
        <div id="screen-learn" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-cyan-400 text-center">คลังความรู้ระบบไหลเวียนเลือด</h2>
            <div id="learn-cards" class="grid gap-4"></div>
            <button onclick="goToBattle()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold hover:bg-emerald-500">เข้าสู่สนามรบ (Boss Battle)</button>
        </div>

        <!-- Battle Screen -->
        <div id="screen-battle" class="hidden space-y-6">
            <div class="glass p-6 rounded-3xl border border-red-500/30">
                <div class="flex justify-between items-center mb-6">
                    <div><p class="text-xs text-slate-400">BOSS VIRUS</p><div id="boss-hp" class="text-2xl font-bold text-red-500">100%</div></div>
                    <div id="q-counter" class="bg-slate-800 px-3 py-1 rounded-full text-xs text-slate-400">คำถาม 1/5</div>
                </div>
                <div class="h-4 bg-slate-800 rounded-full overflow-hidden"><div id="bar-boss" class="health-bar h-full bg-red-500 w-full"></div></div>
                <div id="boss-area" class="text-8xl text-center py-6">🦠</div>
            </div>
            <div id="quiz-box" class="space-y-4">
                <div id="q-text" class="text-xl font-medium text-center p-4 min-h-[4rem] flex items-center justify-center"></div>
                <div id="ans-grid" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>

        <div id="cert-box" class="hidden cert-card mt-10 p-1 border-[16px] border-double border-yellow-500 rounded-2xl bg-slate-900 shadow-2xl">
            <div class="p-8 text-center space-y-4">
                <h1 class="text-5xl font-extrabold text-yellow-500">เกียรติบัตร</h1>
                <p class="text-slate-300">ขอรับรองว่า</p>
                <h2 id="cert-name" class="text-3xl font-bold text-white underline decoration-yellow-500 decoration-4 underline-offset-8"></h2>
                <p id="cert-class" class="text-xl text-slate-400"></p>
                <div class="py-6 border-y border-slate-700 my-6">
                    <p class="text-lg">ผ่านภารกิจกู้ชีพ "Mission Blood Rush"</p>
                    <p class="text-emerald-400 font-bold text-2xl">ผู้พิทักษ์ระบบไหลเวียนเลือดดีเด่น</p>
                </div>
                <button onclick="window.print()" class="no-print w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl font-bold text-xl shadow-lg">💾 พิมพ์/บันทึกเกียรติบัตร</button>
            </div>
        </div>
    </div>

    <script>
        const state = { name: '', class: '', bossHp: 100, qIdx: 0, score: 0 };
        const questions = [
            { q: "หลอดเลือดใดมีผนังหนาที่สุด?", o: ["อาร์เทอรี", "เวน", "เส้นเลือดฝอย", "เส้นเลือดดำ"], a: 0 },
            { q: "เส้นเลือดฝอยทำหน้าที่อะไร?", o: ["แลกเปลี่ยนสาร", "ส่งเลือดเข้าหัวใจ", "กักเก็บเลือด", "ส่งเลือดไปปอด"], a: 0 },
            { q: "หลอดเลือดเวนมีสิ่งใดป้องกันเลือดไหลย้อน?", o: ["กล้ามเนื้อ", "ลิ้น", "ผนังหนา", "ผนังบาง"], a: 1 },
            { q: "หลอดเลือดแดงรับแรงดันจากอวัยวะใด?", o: ["ตับ", "ปอด", "หัวใจ", "ไต"], a: 2 },
            { q: "เลือดสีแดงสดเพราะมีสิ่งใดสูง?", o: ["ไขมัน", "ออกซิเจน", "คาร์บอน", "โปรตีน"], a: 1 }
        ];

        function startGame() {
            state.name = document.getElementById('stu-name').value;
            state.class = document.getElementById('stu-class').value;
            if(!state.name) return alert('กรุณากรอกชื่อ');
            document.getElementById('screen-reg').classList.add('hidden');
            document.getElementById('screen-learn').classList.remove('hidden');
            renderLearn();
        }

        function renderLearn() {
            const items = [{t: "Artery", d: "ผนังหนา รับแรงดันจากหัวใจ"}, {t: "Vein", d: "มีลิ้นกั้นกันเลือดไหลย้อน"}, {t: "Capillary", d: "บาง แลกเปลี่ยนแก๊ส"}];
            document.getElementById('learn-cards').innerHTML = items.map(i => `<div class="glass p-5 rounded-2xl border-l-4 border-red-500"><h3 class="font-bold text-red-400">${i.t}</h3><p class="text-sm text-slate-300">${i.d}</p></div>`).join('');
        }

        function goToBattle() {
            document.getElementById('screen-learn').classList.add('hidden');
            document.getElementById('screen-battle').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[state.qIdx];
            document.getElementById('q-counter').innerText = `คำถาม ${state.qIdx + 1}/5`;
            document.getElementById('q-text').innerText = q.q;
            const grid = document.getElementById('ans-grid');
            grid.innerHTML = '';
            q.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-cyan-500 transition-all text-left";
                b.innerText = opt;
                b.onclick = () => handleAns(i);
                grid.appendChild(b);
            });
        }

        function handleAns(idx) {
            if(idx === questions[state.qIdx].a) {
                state.bossHp = Math.max(0, state.bossHp - 20);
                state.score += 20;
            }
            document.getElementById('bar-boss').style.width = state.bossHp + '%';
            document.getElementById('boss-hp').innerText = state.bossHp + '%';
            
            state.qIdx++;
            if(state.qIdx < questions.length && state.bossHp > 0) loadQuestion();
            else showCertificate();
        }

        function showCertificate() {
            document.getElementById('screen-battle').classList.add('hidden');
            const cert = document.getElementById('cert-box');
            cert.classList.remove('hidden');
            document.getElementById('cert-name').innerText = state.name;
            document.getElementById('cert-class').innerText = state.class;
        }
    </script>
</body>
</html>
